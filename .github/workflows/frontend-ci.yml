name: TastyHub Frontend CI

on:
  push:
    branches:
      - main
      - develop
    # Only run if files in these paths changed (saves CI time and money)
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci*.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci*.yml"

jobs:
  frontend-test:
    runs-on: ubuntu-latest

    # Services are external dependencies we need (like databases)
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Amine
          POSTGRES_DB: TastyHub
        options: >-
          --health-cmd pg_isready       
          --health-interval 10s          
          --health-timeout 5s            
          --health-retries 5
        ports:
          - 5500:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # TODO: Re-enable after resolving glob vulnerability in eslint-config-next
      # The vulnerability is in a dev dependency (eslint-config-next) and doesn't affect production
      # Comprehensive security scans still run in security-scan.yml workflow
      # - name: Run npm audit
      #   working-directory: ./frontend
      #   run: npm audit --audit-level=high

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --include=dev

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run Jest unit tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage

      # Set up database schema (before starting servers)
      - name: Set up database schema
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5500 -U postgres; do
            echo "Waiting for database..."
            sleep 2
          done
          psql postgresql://postgres:Amine@localhost:5500/TastyHub -f ./backend/database/Tasty-Hub.sql || true

      - name: Build Next.js app
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

      # Start backend server for Cypress E2E tests (before frontend)
      - name: Start backend server
        working-directory: ./backend
        env:
          NODE_ENV: ci
          DB_NAME: TastyHub
          DB_USER: postgres
          DB_PASSWORD: Amine
          DB_HOST: localhost
          DB_PORT: 5500
          JWT_SECRET: test_jwt_secret_for_ci_minimum_32_characters_long
          PORT: 5000
        run: |
          npm start &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          sleep 3
          # Wait for server to be ready (max 30 seconds)
          for i in {1..15}; do
            if curl -f http://localhost:5000/api/recipes > /dev/null 2>&1; then
              echo "Backend server is ready!"
              exit 0
            fi
            echo "Waiting for backend server... ($i/15)"
            sleep 2
          done
          echo "Backend server failed to start!"
          exit 1

      # Start frontend server for Cypress E2E tests
      - name: Start frontend server
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: |
          npm start &
          FRONTEND_PID=$!
          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV
          sleep 5
          # Wait for server to be ready (max 30 seconds)
          for i in {1..15}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend server is ready!"
              exit 0
            fi
            echo "Waiting for frontend server... ($i/15)"
            sleep 2
          done
          echo "Frontend server failed to start!"
          exit 1

      # Run Cypress E2E tests
      - name: Run Cypress E2E tests
        working-directory: ./frontend
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_apiUrl: http://localhost:5000/api
        run: npm run test:e2e

      # Stop servers
      - name: Stop servers
        if: always()
        run: |
          if [ -n "$FRONTEND_PID" ]; then
            kill $FRONTEND_PID || true
          fi
          if [ -n "$BACKEND_PID" ]; then
            kill $BACKEND_PID || true
          fi
          pkill -f "node.*next" || true
          pkill -f "node.*index.js" || true
