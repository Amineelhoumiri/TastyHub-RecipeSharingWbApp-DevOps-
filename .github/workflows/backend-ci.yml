name: TastyHub Backend CI

on:
  push:
    branches:
      - main
      - develop
    # Only run if BACKEND files changed (saves CI time and money)
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci*.yml"
  pull_request:
    branches:
      - main
      - develop
    # Only run if BACKEND files changed
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci*.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    # PostgreSQL database service for backend tests
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Amine
          POSTGRES_DB: TastyHub
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5500:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Set up environment variables
        working-directory: ./backend
        run: |
          echo "DB_NAME=TastyHub" >> $GITHUB_ENV
          echo "DB_USER=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=Amine" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5500" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret_for_ci_minimum_32_characters_long" >> $GITHUB_ENV
          echo "PORT=5000" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Set up database schema
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5500 -U postgres; do
            echo "Waiting for database..."
            sleep 2
          done
          psql postgresql://postgres:Amine@localhost:5500/TastyHub -f ./backend/database/Tasty-Hub.sql || true

      - name: Run backend linter
        working-directory: ./backend
        run: npm run lint

      - name: Run backend unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_NAME: TastyHub
          DB_USER: postgres
          DB_PASSWORD: Amine
          DB_HOST: localhost
          DB_PORT: 5500
          JWT_SECRET: test_jwt_secret_for_ci_minimum_32_characters_long
          PORT: 5000
          FRONTEND_URL: http://localhost:3000
        run: npm run test:unit
