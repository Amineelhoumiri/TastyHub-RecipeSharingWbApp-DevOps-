name: TastyHub Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Amine
          POSTGRES_DB: TastyHub
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5500:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci --include=dev

      - name: Set up environment variables
        working-directory: ./server
        run: |
          echo "DB_NAME=TastyHub" >> $GITHUB_ENV
          echo "DB_USER=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=Amine" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5500" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret_for_ci_minimum_32_characters_long" >> $GITHUB_ENV
          echo "PORT=5000" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Set up database schema 
        run: |     
          sudo apt-get update  
          sudo apt-get install -y postgresql-client
          PGPASSWORD=Amine psql -h localhost -p 5500 -U postgres -d TastyHub -f RecipeApp-Database-main/RecipeApp-Database-main/Tasty-Hub.sql --set ON_ERROR_STOP=0 || true

      - name: Run linter
        working-directory: ./server
        run: npm run lint

      - name: Run Jest tests
        working-directory: ./server
        run: npm test
        # Jest script already sets NODE_ENV=test via cross-env, so no need to set it here

      - name: Start server and wait for it to be ready
        working-directory: ./server
        run: |
          # Start server in background and capture its output
          npm start > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server starting (PID: $SERVER_PID)..."

          # Wait for server to be ready (check every 2 seconds, max 30 seconds)
          for i in {1..15}; do
            if curl -f -s http://localhost:5000/api/recipes > /dev/null 2>&1; then
              echo "✅ Server is ready and responding!"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "❌ Server failed to start after 30 seconds"
              echo "Server logs:"
              cat server.log || true
              echo "Checking if process is still running..."
              ps aux | grep node || true
              exit 1
            fi
            echo "Attempt $i/15: Server not ready yet, waiting 2 seconds..."
            sleep 2
          done

      - name: Run Cypress API tests
        working-directory: ./server
        run: npm run test:api
        env:
          CYPRESS_BASE_URL: http://localhost:5000
