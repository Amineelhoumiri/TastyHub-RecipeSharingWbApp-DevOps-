name: TastyHub Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Amine
          POSTGRES_DB: TastyHub
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5500:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci --include=dev

      - name: Set up environment variables
        working-directory: ./server
        run: |
          echo "DB_NAME=TastyHub" >> $GITHUB_ENV
          echo "DB_USER=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=Amine" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5500" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret_for_ci_minimum_32_characters_long" >> $GITHUB_ENV
          echo "PORT=5000" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Run linter
        working-directory: ./server
        run: npm run lint

      - name: Run Jest tests
        working-directory: ./server
        run: npm test

      - name: Start server and wait for it to be ready
        working-directory: ./server
        run: |
          npm start &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          for i in {1..15}; do
            if curl -f http://localhost:5000/api/recipes > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Server failed to start after 30 seconds"
              exit 1
            fi
            echo "Attempt $i: Server not ready yet, waiting..."
            sleep 2
          done

      - name: Run Cypress API tests
        working-directory: ./server
        run: npm run test:api
        env:
          CYPRESS_BASE_URL: http://localhost:5000
