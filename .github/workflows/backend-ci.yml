name: TastyHub Backend CI

on:
  push:
    branches:
      - main
      - develop
    # Only run if files in these paths changed (saves CI time and money)
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "server/**"
      - ".github/workflows/backend-ci*.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    # Services are external dependencies we need (like databases)
    # GitHub Actions will start a PostgreSQL database for us to test with
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Amine
          POSTGRES_DB: TastyHub
        #making sure DB is ready before tests run
        options: >-
          --health-cmd pg_isready       
          --health-interval 10s          
          --health-timeout 5s           
          --health-retries 5            
        # Expose PostgreSQL port 5500 to our test environment
        ports:
          - 5500:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci --include=dev

      - name: Set up environment variables
        working-directory: ./server
        run: |
          # These variables are needed for the server to connect to database and run
          echo "DB_NAME=TastyHub" >> $GITHUB_ENV                    
          echo "DB_USER=postgres" >> $GITHUB_ENV                    
          echo "DB_PASSWORD=Amine" >> $GITHUB_ENV               
          echo "DB_HOST=localhost" >> $GITHUB_ENV                   
          echo "DB_PORT=5500" >> $GITHUB_ENV                        
          echo "JWT_SECRET=test_jwt_secret_for_ci_minimum_32_characters_long" >> $GITHUB_ENV  
          echo "PORT=5000" >> $GITHUB_ENV                           
          echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV   
          echo "NODE_ENV=test" >> $GITHUB_ENV

      # Running ESLint tests for code quality
      - name: Run linter
        working-directory: ./server
        run: npm run lint

      # Running Jest tests
      - name: Run Jest tests
        working-directory: ./server
        run: npm test

      - name: Start server in background
        working-directory: ./server
        run: |
          npm start &                   
          sleep 10                       
          # Try to connect to server and  
          curl --retry 5 --retry-delay 5

      # tests full API endpoints
      - name: Run Cypress API tests
        working-directory: ./server
        run: npm run test:api # Runs Cypress tests that hit the real API
        env:
          CYPRESS_BASE_URL: http://localhost:5000
